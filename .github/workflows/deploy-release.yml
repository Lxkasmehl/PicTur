name: Deploy on GitHub Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to deploy (must exist on origin, e.g. v1.2.3)"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          fingerprint: ${{ secrets.DEPLOY_SSH_FINGERPRINT }}
          command_timeout: 45m
          script: |
            set -euo pipefail
            TAG="${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag }}"
            cd "${{ vars.DEPLOY_PATH }}"
            git fetch origin --tags --prune
            # reset --hard matches the tag on disk and drops any local edits (avoids checkout conflicts).
            git reset --hard "$TAG"
            git clean -fd
            docker compose up --build -d
